<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Sneaker Selection</title>

  <!-- Carter One -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Carter+One&display=swap" rel="stylesheet">

  <!-- Courgette -->
  <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">

  <!-- Material Symbols (all icons in one link) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=male,female,search" />

  <style>
    .material-symbols-outlined {
      font-variation-settings:
      'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24
    }
  </style>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- background shapes -->
  <div class="shape triangle-1"></div>
  <div class="shape rectangle-1"></div>
  <div class="shape triangle-2"></div>
  <div class="shape rectangle-2"></div>

  <!-- header -->
  <header class="main-header">
    <h1 class="title">College Sneaker Selection</h1>

    <div class="controls">

      <!-- gender toggle buttons -->
      <div class="gender-btns">
        <button class="gender-btn active" id="btnAll" onclick="filterGender('all')">All</button>
        <button class="gender-btn" id="btnMen" onclick="filterGender('men')">
          <span class="material-symbols-outlined">male</span>
          Men
        </button>
        <button class="gender-btn" id="btnWomen" onclick="filterGender('women')">
          <span class="material-symbols-outlined">female</span>
          Women
        </button>
      </div>

      <!-- search bar -->
      <div class="search-wrapper">
        <span class="material-symbols-outlined search-icon">search</span>
        <input
          type="text"
          id="searchInput"
          class="search-bar"
          placeholder="Search by name or type..."
          oninput="applyFilters()"
        />
      </div>

    </div>
  </header>

  <!-- card grid -->
  <div id="card-container" class="card-container"></div>

  <!-- empty message -->
  <div id="empty-message" class="empty-message" style="display:none;">
    No sneakers found.
  </div>

  <!-- hidden template card -->
  <div class="card" style="display:none;">
    <img src="" alt="" class="card-img"/>
    <div class="card-info">
      <h2 class="card-name"></h2>
      <p class="card-meta"></p>
      <a href="#" class="card-buy" target="_blank">Buy Here</a>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
