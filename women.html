<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Women's Footwear</title>

  <!-- Space Grotesk -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

  <!-- Lacquer -->
  <link href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap" rel="stylesheet">

  <!-- Cinzel -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">

  <!-- Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close,filter_alt,category,edit" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="women-page">

  <!-- TOP HEADER -->
  <header class="women-header">
    <a href="index.html" class="back-btn">← Home</a>
    <h1 class="women-title">Common Women College Sneakers</h1>
  </header>

  <!-- CONTROL BAR -->
  <div class="control-bar">

    <!-- Category -->
    <div class="control-item">
      <span class="material-symbols-outlined">category</span>
      <select id="categoryFilter" class="control-select">
        <option value="all">Category</option>
        <option value="sneaker">Sneaker</option>
        <option value="slides">Slides</option>
        <option value="boots">Boots</option>
      </select>
    </div>

    <!-- Season -->
    <div class="control-item">
      <span class="material-symbols-outlined">filter_alt</span>
      <select id="seasonFilter" class="control-select">
        <option value="all">Season</option>
        <option value="spring">Spring</option>
        <option value="summer">Summer</option>
        <option value="fall">Fall</option>
        <option value="winter">Winter</option>
      </select>
    </div>

    <!-- Edit -->
    <button class="edit-btn" id="editBtn">
      <span class="material-symbols-outlined">edit</span>
      Edit
    </button>

  </div>

  <!-- CARD GRID -->
  <main id="card-container" class="card-grid">
    <!-- cards injected by scripts.js -->
  </main>

  <!-- EMPTY MESSAGE -->
  <div id="empty-message" class="empty-message" style="display:none;">
    No items found.
  </div>

  <!-- HIDDEN TEMPLATE CARD -->
  <div class="card" style="display:none;">
    <button class="delete-btn" style="display:none;">
      <span class="material-symbols-outlined">close</span>
    </button>
    <img src="" alt="" class="card-img"/>
    <div class="card-info">
      <h2 class="card-name">Shoe Name</h2>
      <div class="card-footer">
        <span class="card-season">Season</span>
        <a href="#" class="card-buy" target="_blank">Buy</a>
      </div>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
